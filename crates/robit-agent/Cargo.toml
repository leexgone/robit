[package]
name = "robit-agent"
version = "0.1.0"
edition = "2021"

[dependencies]
robit-ai = { path = "../robit-ai" }
async-openai = "0.27"
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "2"
tracing = "0.1"
futures = "0.3"
uuid = { version = "1", features = ["v4"] }
dirs = "6"
