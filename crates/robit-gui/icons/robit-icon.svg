<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 背景圆形 -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#A78BFA"/>
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F3F4F6"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGradient)"/>

  <!-- 机器人脸部 -->
  <circle cx="256" cy="260" r="180" fill="url(#faceGradient)"/>

  <!-- 天线 -->
  <rect x="246" y="40" width="20" height="50" rx="10" fill="#4B5563"/>
  <circle cx="256" cy="35" r="18" fill="#FBBF24"/>
  <circle cx="256" cy="35" r="10" fill="#FEF3C7"/>

  <!-- 耳朵/耳机 -->
  <circle cx="70" cy="260" r="28" fill="#4B5563"/>
  <circle cx="442" cy="260" r="28" fill="#4B5563"/>
  <circle cx="70" cy="260" r="16" fill="#9CA3AF"/>
  <circle cx="442" cy="260" r="16" fill="#9CA3AF"/>

  <!-- 眼睛 - 萌萌的大眼睛 -->
  <ellipse cx="190" cy="240" rx="35" ry="45" fill="#1F2937"/>
  <ellipse cx="322" cy="240" rx="35" ry="45" fill="#1F2937"/>

  <!-- 眼睛高光 - 让眼睛有神 -->
  <circle cx="178" cy="225" r="12" fill="#FFFFFF"/>
  <circle cx="188" cy="248" r="5" fill="#FFFFFF"/>
  <circle cx="310" cy="225" r="12" fill="#FFFFFF"/>
  <circle cx="320" cy="248" r="5" fill="#FFFFFF"/>

  <!-- 腮红 - 增加可爱感 -->
  <ellipse cx="130" cy="290" rx="25" ry="15" fill="#FECACA" opacity="0.6"/>
  <ellipse cx="382" cy="290" rx="25" ry="15" fill="#FECACA" opacity="0.6"/>

  <!-- 微笑嘴巴 -->
  <path d="M 200 330 Q 256 370 312 330" stroke="#4B5563" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- 小代码装饰 - 暗示编程能力 -->
  <g transform="translate(236, 410)">
    <path d="M 0 15 L 15 0 L 15 8 L 40 8 L 40 22 L 15 22 L 15 30 Z" fill="#7C3AED"/>
  </g>
</svg>
