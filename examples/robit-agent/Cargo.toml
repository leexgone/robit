[package]
name = "robit-agent-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
robit-ai = { path = "../../crates/robit-ai" }
robit-agent = { path = "../../crates/robit-agent" }
tokio = { version = "1", features = ["full"] }
async-trait = "0.1"
serde_json = "1"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
dirs = "6"
