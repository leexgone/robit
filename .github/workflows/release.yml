name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-cli:
    name: Build CLI (${{ matrix.name }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            os: ubuntu-latest
            binary: robit
            archive: robit-linux-x86_64.tar.gz
          - name: windows-x86_64
            os: windows-latest
            binary: robit.exe
            archive: robit-windows-x86_64.zip
          - name: macos-aarch64
            os: macos-latest
            binary: robit
            archive: robit-macos-aarch64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build robit CLI
        run: cargo build -p robit --release

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.binary }}" dist/
          tar -czf "${{ matrix.archive }}" -C dist "${{ matrix.binary }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/release/${{ matrix.binary }}" dist/
          Compress-Archive -Path "dist/${{ matrix.binary }}" -DestinationPath "${{ matrix.archive }}"

      - name: Upload CLI asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}

  build-gui:
    name: Build GUI (${{ matrix.platform }})
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        platform:
          - ubuntu-22.04
          - windows-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crates/robit-gui/ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: crates/robit-gui/ui
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build frontend
        working-directory: crates/robit-gui/ui
        run: npm run build

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2.0.0

      - name: Build Tauri app
        working-directory: crates/robit-gui
        run: tauri build --verbose

      - name: Upload GUI assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/release/bundle/**/*.AppImage
            target/release/bundle/**/*.deb
            target/release/bundle/**/*.rpm
            target/release/bundle/**/*.dmg
            target/release/bundle/**/*.msi
            target/release/bundle/**/*.exe
            target/release/bundle/**/*.app.tar.gz
            target/release/bundle/**/*.sig
            crates/robit-gui/target/release/bundle/**/*.AppImage
            crates/robit-gui/target/release/bundle/**/*.deb
            crates/robit-gui/target/release/bundle/**/*.rpm
            crates/robit-gui/target/release/bundle/**/*.dmg
            crates/robit-gui/target/release/bundle/**/*.msi
            crates/robit-gui/target/release/bundle/**/*.exe
            crates/robit-gui/target/release/bundle/**/*.app.tar.gz
            crates/robit-gui/target/release/bundle/**/*.sig
